#cloud-config
runcmd:
  - |
    #!/bin/bash
    set -eux
    # データディスクの検出とマウント
    for dev in /dev/sd? /dev/nvme?n?; do
      [ ! -b "$dev" ] && continue
      if lsblk -n "$dev" | grep -q part; then continue; fi
      if blkid "$dev" >/dev/null 2>&1; then continue; fi
      if lsblk -o MODEL "$dev" | grep -q Direct; then continue; fi
      parted -s "$dev" mklabel gpt
      parted -s "$dev" mkpart primary 0% 100%
      partprobe "$dev"
      udevadm settle
      if [[ "$dev" == *nvme* ]]; then PART="${dev}p1"; else PART="${dev}1"; fi
      mkfs.xfs -f "$PART"
      mkdir -p "/datadrive"
      uuid=$(blkid -s UUID -o value "$PART")
      echo "UUID=$uuid /datadrive xfs defaults,nofail 0 0" >> /etc/fstab
      systemctl daemon-reload
      mount "/datadrive"
    done
    # OS ディスク拡張
    dnf install -y cloud-utils-growpart gdisk
    OS_DISK=$(lsblk -o PKNAME,MOUNTPOINT | awk '/\/boot$/ {print $1; exit}')
    if [ -z "$OS_DISK" ]; then exit 1; fi
    if [[ "$OS_DISK" == nvme* ]]; then
      OS_PV_DEV="/dev/${OS_DISK}p4"
      OS_DISK_DEV="/dev/${OS_DISK}"
    else
      OS_PV_DEV="/dev/${OS_DISK}4"
      OS_DISK_DEV="/dev/${OS_DISK}"
    fi
    growpart "$OS_DISK_DEV" 4
    pvresize "$OS_PV_DEV"
    lvresize -r -L +15G /dev/rootvg/rootlv
    lvresize -r -L +20G /dev/rootvg/usrlv
    lvresize -r -L +1T /dev/rootvg/homelv
    lvresize -r -L +30G /dev/rootvg/varlv
    lvresize -r -L +10G /dev/rootvg/tmplv
bootcmd:
  # CUDA Driver install (with checksum verification)
  - sudo dnf install -y kernel-devel-$(uname -r) kernel-headers-$(uname -r)
  - BASE_URL=https://us.download.nvidia.com/tesla
  - DRIVER_VERSION=550.90.07
  - curl -fSsL -O $BASE_URL/$DRIVER_VERSION/NVIDIA-Linux-x86_64-$DRIVER_VERSION.run
  - echo "Verifying NVIDIA driver checksum..."
  - EXPECTED_SHA256="6b17d05a8e45e8e4adb4af4657a33f9f6a8a2dcc86b3b397afbb16e0c4061e60"
  - ACTUAL_SHA256=$(sha256sum NVIDIA-Linux-x86_64-$DRIVER_VERSION.run | awk '{print $1}')
  - if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then echo "CHECKSUM MISMATCH"; rm -f NVIDIA-Linux-x86_64-$DRIVER_VERSION.run; exit 1; fi
  - sudo sh NVIDIA-Linux-x86_64-$DRIVER_VERSION.run -sq
  - rm NVIDIA-Linux-x86_64-$DRIVER_VERSION.run
  # CUDA Toolkit 12.4 (RHEL 9 repo)
  - sudo dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo
  - sudo dnf clean all
  - sudo dnf -y install cuda-toolkit-12-4
  # uv + Python 3.14（root で実行されるため /usr/local/bin に配置）
  - curl -LsSf https://astral.sh/uv/install.sh | env INSTALLER_NO_MODIFY_PATH=1 sh
  - cp /root/.local/bin/uv /usr/local/bin/uv
  - cp /root/.local/bin/uvx /usr/local/bin/uvx
  - uv python install 3.14
  # NVIDIA Container Toolkit (公式リポ)
  - curl -fsSL https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo | sudo tee /etc/yum.repos.d/nvidia-container-toolkit.repo
  - sudo dnf install -y nvidia-container-toolkit
  # Podman
  - sudo dnf install -y podman
packages:
  - kernel
  - kernel-devel
  - kernel-headers
  - kernel-tools
package_update: true
package_upgrade: true
package_reboot_if_required: true
