# ============================================================================
# deploy.yml - dev 自動デプロイ + prod 手動デプロイ
# ============================================================================
name: Deploy

on:
  push:
    branches: [main]
    paths: ['infra/**', 'scripts/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        type: choice
        options: ['dev', 'prod']

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================================
  # dev 環境 - main push 時に自動デプロイ
  # ============================================================================
  deploy-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask Azure IDs
        run: |
          echo "::add-mask::${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ secrets.AZURE_TENANT_ID }}"
          echo "::add-mask::${{ secrets.AZURE_CLIENT_ID }}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate SSH Keys
        run: |
          mkdir -p infra/keys
          ssh-keygen -t rsa -b 4096 -N "" -f infra/keys/id_rsa -q

      - name: Deploy (dev)
        run: |
          az deployment sub create \
            --location japaneast \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters principalid=$(az ad signed-in-user show --query id -o tsv) \
            --name "deploy-dev-$(date +%Y%m%d%H%M%S)" \
            2>&1 | sed \
              -e "s/${{ secrets.AZURE_SUBSCRIPTION_ID }}/***SUB***/g" \
              -e "s/${{ secrets.AZURE_TENANT_ID }}/***TENANT***/g"

  # ============================================================================
  # prod 環境 - 手動トリガー + 承認必須
  # ============================================================================
  deploy-prod:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod  # GitHub Environment protection rules で承認を設定
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask Azure IDs
        run: |
          echo "::add-mask::${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ secrets.AZURE_TENANT_ID }}"
          echo "::add-mask::${{ secrets.AZURE_CLIENT_ID }}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate SSH Keys
        run: |
          mkdir -p infra/keys
          ssh-keygen -t rsa -b 4096 -N "" -f infra/keys/id_rsa -q

      - name: What-If (prod)
        run: |
          az deployment sub what-if \
            --location japaneast \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.bicepparam \
            --parameters principalid=$(az ad signed-in-user show --query id -o tsv) \
            2>&1 | sed \
              -e "s/${{ secrets.AZURE_SUBSCRIPTION_ID }}/***SUB***/g" \
              -e "s/${{ secrets.AZURE_TENANT_ID }}/***TENANT***/g"

      - name: Deploy (prod)
        run: |
          az deployment sub create \
            --location japaneast \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.bicepparam \
            --parameters principalid=$(az ad signed-in-user show --query id -o tsv) \
            --name "deploy-prod-$(date +%Y%m%d%H%M%S)" \
            2>&1 | sed \
              -e "s/${{ secrets.AZURE_SUBSCRIPTION_ID }}/***SUB***/g" \
              -e "s/${{ secrets.AZURE_TENANT_ID }}/***TENANT***/g"
