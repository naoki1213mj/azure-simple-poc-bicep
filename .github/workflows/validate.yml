# ============================================================================
# validate.yml - PR 時の Bicep バリデーション + What-If
# ============================================================================
name: Validate

on:
  pull_request:
    branches: [main]
    paths: ['infra/**']

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask Azure IDs
        run: |
          echo "::add-mask::${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ secrets.AZURE_TENANT_ID }}"
          echo "::add-mask::${{ secrets.AZURE_CLIENT_ID }}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep

      - name: What-If (dev)
        id: whatif
        run: |
          RESULT=$(az deployment sub what-if \
            --location japaneast \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --no-pretty-print 2>&1 | sed \
              -e "s/${{ secrets.AZURE_SUBSCRIPTION_ID }}/***SUB***/g" \
              -e "s/${{ secrets.AZURE_TENANT_ID }}/***TENANT***/g" \
              -e "s/${{ secrets.AZURE_CLIENT_ID }}/***CLIENT***/g" \
            || true)
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" | head -200 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment What-If on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### 🔍 Bicep What-If 結果 (dev)\n\n\`\`\`\n${process.env.WHATIF_RESULT}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.substring(0, 65000)
            });
        env:
          WHATIF_RESULT: ${{ steps.whatif.outputs.result }}
